<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Explorer | Meta Ads Intelligence</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .explorer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .explorer-search {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .explorer-search input {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border-md);
      border-radius: var(--r-md);
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: var(--ff-ui);
      font-size: 13px;
      outline: none;
    }

    .explorer-search input:focus {
      border-color: var(--fb);
    }

    .explorer-search svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .cat-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--muted);
      transition: all 0.15s;
    }

    .cat-btn:hover,
    .cat-btn.active {
      color: var(--text);
      border-color: var(--border-md);
    }

    .cat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }

    .field-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-left: 2px solid;
      border-radius: var(--r-md);
      padding: 12px 14px;
      transition: border-color .15s, background .15s;
    }

    .field-card:hover {
      background: var(--bg-2);
    }

    .field-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .field-name {
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: -.1px;
      line-height: 1.3;
    }

    .field-api {
      font-size: 10px;
      font-family: var(--ff-mono);
      color: var(--muted);
      margin-top: 3px;
      word-break: break-all;
    }

    .field-desc {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 6px;
    }

    .type-badge {
      font-size: 9px;
      font-weight: 700;
      font-family: var(--ff-mono);
      padding: 2px 7px;
      border-radius: 5px;
      white-space: nowrap;
      margin-top: 1px;
    }

    .t-num {
      background: var(--fb-dim);
      color: var(--fb);
    }

    .t-str {
      background: var(--green-dim);
      color: var(--green);
    }

    .t-pct {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .t-cur {
      background: var(--purple-dim);
      color: var(--purple);
    }

    .t-arr {
      background: rgba(244, 114, 182, 0.13);
      color: #f472b6;
    }

    .t-date {
      background: rgba(45, 212, 191, 0.13);
      color: #2dd4bf;
    }

    .exp-section {
      margin-bottom: 28px;
    }

    .exp-sec-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .exp-sec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .exp-sec-title {
      font-size: 13px;
      font-weight: 700;
    }

    .exp-sec-count {
      font-size: 10.5px;
      font-family: var(--ff-mono);
      color: var(--muted);
      margin-left: auto;
    }

    .exp-empty {
      text-align: center;
      padding: 60px 20px;
    }
  </style>
</head>

<body>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo"><img src="logo.png" alt="Sm" /></div>
      <div class="brand-text">
        <div class="brand-name">Sm Dashboard</div>
        <div class="brand-sub">META ADS INTELLIGENCE</div>
      </div>
    </div>

    <div class="nav-section" style="flex:1;overflow-y:auto;padding-bottom:16px;">
      <div class="nav-label">Analytics</div>
      <nav class="nav">
        <!-- separate page links -->
        <a href="dashboard.html" class="nav-link">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1.5" />
            <rect x="14" y="3" width="7" height="7" rx="1.5" />
            <rect x="3" y="14" width="7" height="7" rx="1.5" />
            <rect x="14" y="14" width="7" height="7" rx="1.5" />
          </svg>
          Overview
        </a>
        <a href="dashboard.html" class="nav-link">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
          </svg>
          Campaigns
        </a>
        <a href="dashboard.html" class="nav-link">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
          </svg>
          Ad Sets
        </a>
        <a href="dashboard.html" class="nav-link">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16" />
          </svg>
          Ads
        </a>
      </nav>

      <div class="nav-label" style="margin-top:8px;">Tools</div>
      <nav class="nav">
        <a href="explorer.html" class="nav-link active">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          Data Explorer <span class="nav-badge"
            style="background:var(--fb-dim);color:var(--fb);font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:auto;">100+</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <div style="margin-bottom:10px;">
        <div
          style="font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">
          Active Account</div>
        <div style="font-size:12px;color:var(--text-2);font-weight:600;" id="sidebarAccName">—</div>
        <div style="font-size:10.5px;color:var(--muted);font-family:var(--ff-mono);" id="sidebarAccId">—</div>
      </div>
      <button id="disconnectBtn" onclick="disconnectFacebook()"
        style="margin-top:12px;width:100%;padding:7px 10px;background:transparent;border:1px solid var(--border-md);border-radius:var(--r-sm);color:var(--muted);font-family:var(--ff-ui);font-size:11.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;"
        onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'"
        onmouseout="this.style.borderColor='var(--border-md)';this.style.color='var(--muted)'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Disconnect
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="layout">
    <header class="topbar">
      <div class="topbar-l">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div>
          <div class="page-h1">API Explorer</div>
          <div class="page-desc">100+ available fields from the Meta Ads Insights API</div>
        </div>
      </div>
    </header>

    <div class="content" style="padding:24px 28px;">
      <div class="explorer-header" style="margin-bottom:28px;">
        <div class="explorer-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input id="explorerSearch" placeholder="Search fields, API names..." oninput="explorerRender()" />
        </div>
        <div class="chip chip--slate" id="explorerCount" style="padding:4px 12px;">— fields</div>
      </div>

      <div class="cat-bar" id="explorerCatBar"></div>
      <div id="explorerBody"></div>
    </div>
  </main>

  <script src="explorer.js"></script>
</body>

</html>
